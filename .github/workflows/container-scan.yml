name: Security - Container Scan (Trivy)

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cicd-secure-app .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cicd-secure-app
          format: table
          exit-code: 1
          severity: CRITICAL